<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Recitation Check</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3350;
  --accent: #6c8fff;
  --accent2: #a78bfa;
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --text: #e8eaf6;
  --muted: #7b82a8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 40px; }

.header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }
.header h1 { font-size: 14px; font-weight: 500; letter-spacing: 0.04em; }
.header .poc { margin-left: auto; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; background: var(--surface); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); }

.screen { display: none; padding: 20px; }
.screen.active { display: block; }
.loading { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 20px; }
.loading.active { display: flex; }

/* Surah list */
.label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.surah-list { display: flex; flex-direction: column; gap: 8px; }
.surah-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: all 0.12s; -webkit-tap-highlight-color: transparent;
}
.surah-card:active { background: var(--surface2); border-color: var(--accent); transform: scale(0.985); }
.snum { font-size: 11px; color: var(--muted); width: 26px; text-align: right; flex-shrink: 0; }
.sinfo { flex: 1; }
.sen { font-size: 14px; font-weight: 500; }
.smeaning { font-size: 11px; color: var(--muted); margin-top: 2px; }
.sar { font-family: 'Amiri', serif; font-size: 20px; color: var(--accent2); flex-shrink: 0; }

/* Record screen */
.back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; margin-bottom: 24px; -webkit-tap-highlight-color: transparent; }
.back:active { color: var(--text); }
.hero { text-align: center; margin-bottom: 28px; }
.hero .ar { font-family: 'Amiri', serif; font-size: 38px; color: var(--text); line-height: 1.4; margin-bottom: 4px; direction: rtl; }
.hero .en { font-size: 16px; font-weight: 500; }
.hero .meaning { font-size: 12px; color: var(--muted); margin-top: 2px; }

.ayahs-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 28px; direction: rtl; }
.ayah-line { font-family: 'Amiri', serif; font-size: 19px; line-height: 2.1; color: var(--text); }
.anum { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: var(--surface2); border-radius: 50%; font-family: 'DM Sans', sans-serif; font-size: 9px; color: var(--muted); margin-right: 6px; vertical-align: middle; direction: ltr; }

.record-area { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.rtimer { font-size: 24px; font-weight: 300; color: var(--text); font-variant-numeric: tabular-nums; min-height: 32px; }
.rbtn {
  width: 76px; height: 76px; border-radius: 50%; border: none;
  background: var(--accent); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.rbtn.rec { background: var(--red); animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); } 50% { box-shadow: 0 0 0 16px rgba(248,113,113,0); } }
.rlabel { font-size: 13px; color: var(--muted); }

.playback { display: none; flex-direction: column; gap: 14px; margin-top: 10px; width: 100%; }
.playback.show { display: flex; }
audio { width: 100%; height: 38px; border-radius: 8px; }

.btn-row { display: flex; gap: 10px; }
.btn { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.12s; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.97); }
.btn-ghost { background: var(--surface); color: var(--muted); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }

.err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 10px; padding: 12px; font-size: 13px; color: var(--red); line-height: 1.6; display: none; }
.err.show { display: block; }

/* Loading */
.spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-ar { font-family: 'Amiri', serif; font-size: 28px; color: var(--accent2); }
.loading-txt { font-size: 13px; color: var(--muted); }

/* Results */
.result-top { text-align: center; margin-bottom: 24px; }
.badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; margin-bottom: 10px; }
.badge-ok { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.badge-warn { background: rgba(251,191,36,0.15); color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
.badge-err { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.result-name { font-size: 17px; font-weight: 500; }
.result-name .ar { font-family: 'Amiri', serif; color: var(--accent2); font-size: 20px; }

.assessment-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
.card-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.assessment-txt { font-size: 14px; line-height: 1.85; color: var(--text); white-space: pre-wrap; }
</style>
</head>
<body>

<div class="header">
  <div class="dot"></div>
  <h1>Recitation Check</h1>
  <span class="poc">POC</span>
</div>

<!-- Select -->
<div class="screen active" id="s-select">
  <p class="label">Select a surah</p>
  <div class="surah-list" id="surah-list"></div>
</div>

<!-- Record -->
<div class="screen" id="s-record">
  <div class="back" onclick="goBack()">← Back</div>
  <div class="hero">
    <div class="ar" id="r-ar"></div>
    <div class="en" id="r-en"></div>
    <div class="meaning" id="r-meaning"></div>
  </div>
  <div class="ayahs-box" id="r-ayahs"></div>
  <div class="record-area">
    <div class="rtimer" id="timer"></div>
    <button class="rbtn" id="rbtn" onclick="toggleRecord()">
      <svg id="mic" width="26" height="26" viewBox="0 0 24 24" fill="white">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <svg id="stop" width="26" height="26" viewBox="0 0 24 24" fill="white" style="display:none">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>
    <div class="rlabel" id="rlabel">Tap to record</div>
  </div>
  <div class="playback" id="playback">
    <audio id="aplayer" controls></audio>
    <div class="err" id="errmsg"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="resetRec()">Re-record</button>
      <button class="btn btn-primary" onclick="submit()">Check recitation →</button>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading" id="s-loading">
  <div class="loading-ar" id="load-ar"></div>
  <div class="spinner"></div>
  <div class="loading-txt">Gemini is listening…</div>
</div>

<!-- Results -->
<div class="screen" id="s-results">
  <div class="back" onclick="goSelect()">← Try another surah</div>
  <div class="result-top">
    <div id="badge" class="badge badge-ok"><span id="bicon">✓</span><span id="btext">Complete recitation</span></div>
    <div class="result-name" id="rname"></div>
  </div>
  <div class="assessment-card">
    <div class="card-label">Gemini assessment</div>
    <div class="assessment-txt" id="aout"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="recAgain()">Record again</button>
    <button class="btn btn-primary" onclick="goSelect()">Another surah</button>
  </div>
</div>

<script>
// API key is loaded from the URL hash so it never lives in the file.
// Usage: open the page as https://yoursite.github.io/recitation-prototype#YOUR_KEY_HERE
// The key is never stored, never in git history, never sent anywhere except Gemini.
const GEMINI_API_KEY = window.location.hash.slice(1) || '';
const GEMINI_MODEL  = 'gemini-2.5-flash';

// Show a setup prompt if no key is provided
if (!GEMINI_API_KEY) {
  document.addEventListener('DOMContentLoaded', () => {
    const key = prompt('Enter your Gemini API key to continue:\n\nGet one free at aistudio.google.com/apikey');
    if (key) {
      window.location.hash = key;
      window.location.reload();
    }
  });
}

const SURAHS = [
  { num:1, ar:'الْفَاتِحَة', en:'Al-Fatiha', meaning:'The Opening', ayahs:[

  ]},
  { num:91, ar:'الشَّمْس', en:'Al-Shams', meaning:'The Sun', ayahs:[

    'وَالشَّمْسِ وَضُحَاهَا','وَالْقَمَرِ إِذَا تَلَاهَا','وَالنَّهَارِ إِذَا جَلَّاهَا',

    'وَقَدْ خَابَ مَن دَسَّاهَا','كَذَّبَتْ ثَمُودُ بِطَغْوَاهَا','إِذِ انبَعَثَ أَشْقَاهَا',

let current = null, recorder = null, chunks = [], blob = null, timerRef = null, secs = 0, recordingStart = 0;

function show(id) {
  document.querySelectorAll('.screen,.loading').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderList() {
  document.getElementById('surah-list').innerHTML = SURAHS.map(s => `
    <div class="surah-card" onclick="pick(${s.num})">
      <span class="snum">${s.num}</span>
      <div class="sinfo"><div class="sen">${s.en}</div><div class="smeaning">${s.meaning}</div></div>
      <span class="sar">${s.ar}</span>
    </div>`).join('');
}

function pick(num) {
  current = SURAHS.find(s => s.num === num);
  resetRec();
  document.getElementById('r-ar').textContent = current.ar;
  document.getElementById('r-en').textContent = current.en;
  document.getElementById('r-meaning').textContent = current.meaning;
  document.getElementById('r-ayahs').innerHTML = current.ayahs.map((a,i) =>
    `<div class="ayah-line"><span class="anum">${i===0?'﷽':i}</span>${a}</div>`
  ).join('');
  show('s-record');
}

function goBack() { stopRec(); show('s-select'); }
function goSelect() { stopRec(); show('s-select'); }
function recAgain() { resetRec(); show('s-record'); }

async function toggleRecord() {
  if (recorder && recorder.state === 'recording') { stopRec(); }
  else { await startRec(); }
}

async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      blob = new Blob(chunks, { type: 'audio/webm' });
      document.getElementById('aplayer').src = URL.createObjectURL(blob);
      document.getElementById('playback').classList.add('show');
      stream.getTracks().forEach(t => t.stop());
    };
    recorder.start();
    recordingStart = Date.now();
    document.getElementById('rbtn').classList.add('rec');
    document.getElementById('mic').style.display = 'none';
    document.getElementById('stop').style.display = 'block';
    document.getElementById('rlabel').textContent = 'Recording… tap to stop';
    document.getElementById('playback').classList.remove('show');
    secs = 0;
    timerRef = setInterval(() => {
      secs++;
      const m = String(Math.floor(secs/60)).padStart(2,'0');
      const s = String(secs%60).padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
  } catch(e) { showErr('Microphone access denied. Please allow microphone access and try again.'); }
}

function stopRec() {
  if (recorder && recorder.state === 'recording') recorder.stop();
  clearInterval(timerRef);
  document.getElementById('rbtn').classList.remove('rec');
  document.getElementById('mic').style.display = 'block';
  document.getElementById('stop').style.display = 'none';
  document.getElementById('rlabel').textContent = 'Tap to record';
}

function resetRec() {
  stopRec(); blob = null; chunks = [];
  document.getElementById('timer').textContent = '';
  document.getElementById('playback').classList.remove('show');
  document.getElementById('aplayer').src = '';
  hideErr();
}

async function submit() {
  if (!blob) return;
  hideErr();

  // Quality gate 1: minimum duration
  const MIN_SECONDS = 3;
  if (secs < MIN_SECONDS) {
    showErr(`Recording is too short (${secs}s). Please record your full recitation.`);
    return;
  }

  // Quality gate 2: silence detection — check audio has meaningful volume
  try {
    const arrayBuf = await blob.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const decoded = await audioCtx.decodeAudioData(arrayBuf);
    const channelData = decoded.getChannelData(0);
    // Calculate RMS volume
    let sum = 0;
    for (let i = 0; i < channelData.length; i++) sum += channelData[i] * channelData[i];
    const rms = Math.sqrt(sum / channelData.length);
    await audioCtx.close();
    if (rms < 0.005) {
      showErr('No audio detected — the recording appears to be silent. Please check your microphone and try again.');
      return;
    }
  } catch(e) {
    // If audio analysis fails, proceed anyway — don't block on analysis error
    console.warn('Audio quality check failed:', e);
  }
  document.getElementById('load-ar').textContent = current.ar;
  show('s-loading');
  try {
    const b64 = await new Promise((res,rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(blob);
    });

    // Bismillah is Ayah 0, surah ayahs start at 1
    const ayahList = current.ayahs.map((a,i) => `  Ayah ${i === 0 ? '0' : i}: ${a}`).join('\n');
    const prompt = `You are an experienced Quran teacher giving concise feedback on a child's recitation.
Be direct and clear. No greetings, no placeholders like [Parent Name] or [Child Name].

The child was supposed to recite ${current.en} (Surah ${current.num}).
The expected Arabic text is:

${ayahList}

Note: Ayah 0 is the Bismillah. It is optional — if the child did not recite it, mark it as Optional rather than Missing and do not treat it as an error.

Listen carefully to the audio recording and provide the following:

1. TRANSCRIPT: What you heard, written in Arabic script. (This section only should be in Arabic.)

2. AYAH COVERAGE: For each ayah, state Complete, Partial, or Missing.
   Use natural teacher language in your notes — e.g. "came through clearly" or "stumbled a little here" rather than clinical descriptions.

3. WORDS TO WORK ON: Any specific words that were missing, substituted, or unclear — phrased as gentle guidance. E.g. "The word X wasn't quite there — worth drilling this one."

4. FOR THE PARENT: 2-3 short sentences. What went well, what needs work at home, any patterns worth noting (hesitations, rushing, needing prompting). Straightforward and honest.

5. FOR THE CHILD: One short sentence of encouragement. Specific to something they actually did well in this recitation.

Respond in English only. Use Arabic script only when quoting specific Quranic words or ayahs.

IMPORTANT: If the audio is silent, empty, too short, or contains no recognisable recitation, do not fabricate an assessment. Instead respond only with: "INVALID RECORDING: [reason]" and nothing else.

Accuracy guidelines:
- Be strict about whether each word was present or absent. Do not assume a word was said if you did not clearly hear it.
- Be lenient only on natural child speech variations: soft voice, slight accent.
- Do NOT be lenient on: missing words, substituted words, skipped ayahs, or incorrect word endings.
- Short vowel endings (ḥarakāt) are not accent variations — they are grammatically meaningful and must match the expected text exactly. The three endings are: ḍamma (u sound), kasra (i sound), and fatḥa (a sound). For example, "lailat-IL qadr" (kasra, genitive — correct in this position) vs "lailat-UL qadr" (ḍamma, nominative — wrong here) is a real error that changes the grammar of the Arabic. Flag any mismatched vowel ending under WORDS TO WORK ON.
- If uncertain whether a word was said, mark it as unclear rather than assuming Complete.

Full expected text: ${current.ayahs.join(' ')}`;

    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: (blob.type || 'audio/webm').split(';')[0], data: b64 } }] }],
          generationConfig: { temperature: 0.1, topP: 0.9 }
        })
      }
    );

    if (!resp.ok) {
      const e = await resp.json();
      throw new Error(e.error?.message || `API error ${resp.status}`);
    }

    const data = await resp.json();
    const assessment = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!assessment) throw new Error('No response received from Gemini');

    // Check for invalid recording response
    if (assessment.trim().startsWith('INVALID RECORDING')) {
      show('s-record');
      showErr(assessment.replace('INVALID RECORDING:', '').trim() || 'Recording could not be assessed. Please try again.');
      return;
    }

    // Badge logic
    const lower = assessment.toLowerCase();
    const hasMissing = /\bmissing\b/.test(lower) && !/no words.*missing|none.*missing|not.*missing/.test(lower);
    const hasPartial = /\bpartial\b/.test(lower);
    const badge = document.getElementById('badge');
    badge.className = 'badge';
    if (hasMissing) {
      badge.classList.add('badge-err');
      document.getElementById('bicon').textContent = '✗';
      document.getElementById('btext').textContent = 'Needs review';
    } else if (hasPartial) {
      badge.classList.add('badge-warn');
      document.getElementById('bicon').textContent = '△';
      document.getElementById('btext').textContent = 'Almost complete';
    } else {
      badge.classList.add('badge-ok');
      document.getElementById('bicon').textContent = '✓';
      document.getElementById('btext').textContent = 'Complete recitation';
    }

    document.getElementById('rname').innerHTML = `${current.en} <span class="ar">${current.ar}</span>`;
    document.getElementById('aout').textContent = assessment;
    show('s-results');

  } catch(e) {
    show('s-record');
    showErr(`Assessment failed: ${e.message}`);
  }
}

function showErr(msg) { const b = document.getElementById('errmsg'); b.textContent = msg; b.classList.add('show'); }
function hideErr() { document.getElementById('errmsg').classList.remove('show'); }

renderList();
</script>
